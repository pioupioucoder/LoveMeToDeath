<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Me To Death</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --blood:#8B0000;--crimson:#DC143C;--rose:#FF6B8A;--petal:#FFD6E0;
  --obsidian:#0A0A0F;--midnight:#12121A;--dusk:#1E1E2E;--twilight:#2A2A3E;
  --mist:#C8B8D0;--silver:#E8DDF0;--gold:#C9A84C;
  --affinity-pos:#DC143C;--affinity-neg:#6B21A8;
  --text-main:#F0E8F5;--text-dim:#9B8FAA;
  --box-bg:rgba(10,10,15,0.88);--box-border:rgba(200,160,200,0.25);
  --choice-bg:rgba(20,10,30,0.85);--choice-hover:rgba(139,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--obsidian);font-family:'Cormorant Garamond',serif;color:var(--text-main);overflow:hidden;user-select:none}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s ease;z-index:10}
.screen.active{opacity:1;pointer-events:all}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3}

#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--crimson);opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}

#title-screen{background:radial-gradient(ellipse at 50% 30%,#1a0510 0%,var(--obsidian) 70%)}
.title-bg-roses{position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(139,0,0,.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(139,0,0,.10) 0%,transparent 40%);pointer-events:none}
.title-deco{position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:30%;background:linear-gradient(to bottom,transparent,var(--blood))}
.title-deco::after{content:'\2756';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);color:var(--blood);font-size:12px}
.title-wrap{position:relative;text-align:center;z-index:2}
.title-sub{font-family:'Cinzel',serif;font-size:clamp(.55rem,1.5vw,.8rem);letter-spacing:.5em;color:var(--blood);text-transform:uppercase;margin-bottom:1.2rem;opacity:0;animation:fadeIn 1.5s .5s forwards}
.title-main{font-family:'Cinzel',serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:600;color:var(--silver);line-height:1;text-shadow:0 0 60px rgba(220,20,60,.4),0 0 120px rgba(220,20,60,.2);opacity:0;animation:titleReveal 5s .8s forwards}
.title-main span{color:var(--crimson)}
@keyframes titleReveal{0%{opacity:0;transform:translateY(30px);filter:blur(12px)}20%{opacity:.3;transform:translateY(15px);filter:blur(6px)}60%{opacity:.85;transform:translateY(4px);filter:blur(1px)}100%{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeIn{to{opacity:1}}
.title-line{display:flex;align-items:center;gap:1rem;margin:1.5rem 0 2.5rem;opacity:0;animation:fadeIn 1.5s 3.5s forwards}
.title-line::before,.title-line::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--blood))}
.title-line::after{background:linear-gradient(to left,transparent,var(--blood))}
.title-line-icon{color:var(--crimson);font-size:1rem}
.btn-start{font-family:'Cinzel',serif;font-size:clamp(.8rem,2vw,1rem);letter-spacing:.3em;color:var(--silver);background:transparent;border:1px solid rgba(220,20,60,.5);padding:1rem 3rem;cursor:pointer;position:relative;overflow:hidden;transition:all .4s ease;opacity:0;animation:fadeIn 1.5s 4.2s forwards}
.btn-start::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blood),transparent);opacity:0;transition:opacity .4s}
.btn-start:hover{border-color:var(--crimson);color:#fff;letter-spacing:.4em;box-shadow:0 0 30px rgba(220,20,60,.3)}
.btn-start:hover::before{opacity:1}

#lang-screen{background:radial-gradient(ellipse at 50% 50%,#0d0515 0%,var(--obsidian) 80%)}
.lang-title{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,2rem);color:var(--silver);margin-bottom:.5rem;text-align:center}
.lang-sub{font-size:clamp(.75rem,2vw,.95rem);color:var(--text-dim);font-style:italic;margin-bottom:3rem;text-align:center}
.lang-choices{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.lang-btn{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:2rem 2.5rem;background:rgba(30,20,40,.8);border:1px solid var(--box-border);cursor:pointer;transition:all .3s ease;min-width:160px}
.lang-btn:hover{border-color:var(--crimson);transform:translateY(-4px);box-shadow:0 10px 30px rgba(220,20,60,.2)}
.lang-flag{font-size:3.5rem;line-height:1}
.lang-name{font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.2em;color:var(--silver)}

#policy-screen{background:var(--obsidian);padding:1rem}
.policy-container{width:100%;max-width:700px;display:flex;flex-direction:column;height:100vh;max-height:100vh;padding:2rem 1.5rem 1.5rem}
.policy-header{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.5rem);color:var(--silver);text-align:center;border-bottom:1px solid var(--box-border);padding-bottom:1rem;margin-bottom:1.2rem;flex-shrink:0}
.policy-scroll{flex:1;overflow-y:auto;font-size:clamp(.75rem,1.8vw,.9rem);line-height:1.9;color:var(--mist);padding-right:.5rem;scroll-behavior:smooth}
.policy-scroll::-webkit-scrollbar{width:3px}
.policy-scroll::-webkit-scrollbar-thumb{background:var(--blood);border-radius:2px}
.policy-scroll h3{font-family:'Cinzel',serif;color:var(--crimson);font-size:.85rem;letter-spacing:.15em;margin:1.5rem 0 .5rem}
.policy-scroll p{margin-bottom:.8rem}
.policy-scroll .credits{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--box-border);font-style:italic;font-size:.8rem;color:var(--text-dim)}
.policy-progress{height:2px;background:rgba(255,255,255,.05);margin:.8rem 0;flex-shrink:0}
.policy-progress-bar{height:100%;background:var(--blood);width:0%;transition:width .1s}
.policy-footer{display:flex;align-items:center;gap:1rem;padding-top:1rem;flex-shrink:0;border-top:1px solid var(--box-border);flex-wrap:wrap;justify-content:center}
.policy-hint{font-size:.75rem;color:var(--text-dim);font-style:italic;flex:1;min-width:150px}
.btn-accept{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;background:var(--blood);color:#fff;border:none;padding:.8rem 2rem;cursor:pointer;opacity:.4;transition:all .3s;pointer-events:none}
.btn-accept.ready{opacity:1;pointer-events:all}
.btn-accept.ready:hover{background:var(--crimson);box-shadow:0 0 20px rgba(220,20,60,.4)}

#loading-screen{background:var(--obsidian);z-index:50}
.loading-inner{text-align:center}
.loading-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.4em;color:var(--blood);margin-bottom:2rem;text-transform:uppercase}
.loading-bar-outer{width:280px;height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;margin:0 auto 1rem}
.loading-bar-inner{height:100%;background:var(--crimson);width:0%;transition:width .3s ease;border-radius:1px}
.loading-pct{font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-dim);letter-spacing:.3em}

#game-screen{background:var(--obsidian);padding:0}
#game-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
#char-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);z-index:2;max-height:85%;display:flex;align-items:flex-end;justify-content:center;transition:opacity .5s ease;pointer-events:none}
#char-img{max-height:100%;max-width:60vw;object-fit:contain;filter:drop-shadow(0 0 30px rgba(0,0,0,.8))}
@media(max-width:600px){#char-img{max-width:100vw}#char-wrap{max-height:100%}}

#hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)}
.hud-left,.hud-right{display:flex;align-items:center;gap:.8rem}
#affinity-wrap{display:flex;align-items:center;gap:.5rem}
.affinity-icon{font-size:1.1rem;filter:drop-shadow(0 0 4px var(--crimson));transition:filter .5s}
#affinity-bar-outer{width:80px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;position:relative}
#affinity-bar{height:100%;width:50%;border-radius:3px;background:linear-gradient(to right,var(--affinity-neg),var(--affinity-pos));transition:width .6s cubic-bezier(.4,0,.2,1),background .6s;position:absolute;left:0}
#affinity-val{font-family:'Cinzel',serif;font-size:.7rem;color:var(--mist);min-width:2.5rem;text-align:center;transition:color .5s}
.hud-btn{background:rgba(10,10,15,.7);border:1px solid var(--box-border);color:var(--mist);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;border-radius:2px}
.hud-btn:hover{border-color:var(--crimson);color:var(--silver)}

#dialogue-wrap{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 1rem 1rem}
#dialogue-box{background:var(--box-bg);border:1px solid var(--box-border);border-radius:2px;backdrop-filter:blur(12px);overflow:hidden}
#speaker-bar{padding:.4rem 1.2rem;border-bottom:1px solid var(--box-border);display:flex;align-items:center;gap:.5rem}
#speaker-name{font-family:'Cinzel',serif;font-size:clamp(.75rem,2vw,.9rem);color:var(--crimson);letter-spacing:.15em}
.speaker-deco{color:var(--blood);font-size:.6rem}
#dialogue-text{padding:1rem 1.2rem;font-size:clamp(.9rem,2.5vw,1.1rem);font-family:'IM Fell English',serif;line-height:1.7;color:var(--text-main);min-height:5em}
#dialogue-nav{display:flex;align-items:center;justify-content:space-between;padding:.3rem 1.2rem .6rem;border-top:1px solid rgba(200,160,200,.08)}
#btn-back-dialogue{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.15em;color:var(--text-dim);background:transparent;border:1px solid rgba(200,160,200,.15);padding:.25rem .7rem;cursor:pointer;transition:all .2s;border-radius:2px;opacity:0;pointer-events:none}
#btn-back-dialogue.visible{opacity:1;pointer-events:all}
#btn-back-dialogue:hover{border-color:var(--crimson);color:var(--rose)}
#dialogue-continue{color:var(--blood);font-size:.75rem;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

#choices-wrap{position:absolute;bottom:0;left:0;right:0;z-index:11;padding:0 1rem 1rem;display:none;flex-direction:column;gap:.6rem}
.choice-btn{background:var(--choice-bg);border:1px solid var(--box-border);color:var(--silver);padding:.9rem 1.5rem;font-family:'IM Fell English',serif;font-size:clamp(.85rem,2.2vw,1rem);cursor:pointer;text-align:left;transition:all .25s ease;backdrop-filter:blur(10px);border-radius:2px;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--crimson);transform:scaleY(0);transition:transform .2s}
.choice-btn:hover{background:var(--choice-hover);border-color:rgba(220,20,60,.5);transform:translateX(4px)}
.choice-btn:hover::before{transform:scaleY(1)}

#history-overlay{position:fixed;inset:0;z-index:50;background:rgba(5,5,10,.95);display:none;flex-direction:column;backdrop-filter:blur(8px)}
.history-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--box-border);display:flex;align-items:center;justify-content:space-between;font-family:'Cinzel',serif;font-size:.9rem;color:var(--mist);letter-spacing:.2em}
#history-list{flex:1;overflow-y:auto;padding:1rem 1.5rem}
#history-list::-webkit-scrollbar{width:3px}
#history-list::-webkit-scrollbar-thumb{background:var(--blood)}
.history-entry{margin-bottom:1.2rem;font-family:'IM Fell English',serif;font-size:clamp(.85rem,2vw,1rem);line-height:1.7;color:var(--text-dim)}
.history-entry .h-name{color:var(--crimson);font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.1em;margin-bottom:.2rem}
.history-entry .h-choice{color:var(--rose);font-style:italic}

#pause-modal{position:fixed;inset:0;z-index:60;background:rgba(5,5,10,.92);display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
.pause-panel{background:rgba(15,10,20,.95);border:1px solid var(--box-border);padding:2.5rem 3rem;min-width:280px;max-width:400px;width:90%;display:flex;flex-direction:column;gap:.8rem}
.pause-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--silver);text-align:center;letter-spacing:.3em;margin-bottom:.5rem;border-bottom:1px solid var(--box-border);padding-bottom:.8rem}
.pause-btn{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;background:transparent;border:1px solid var(--box-border);color:var(--mist);padding:.9rem;cursor:pointer;transition:all .2s;text-align:center}
.pause-btn:hover{border-color:var(--crimson);color:var(--silver);background:rgba(139,0,0,.15)}
.pause-btn.danger{color:#ff6b6b;border-color:rgba(255,107,107,.3)}
.pause-btn.danger:hover{background:rgba(200,0,0,.15);border-color:#ff6b6b}
.volume-row{display:flex;align-items:center;gap:.8rem;padding:.5rem 0;border-top:1px solid var(--box-border);margin-top:.5rem}
.vol-label{font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-dim);letter-spacing:.15em;min-width:60px}
#vol-slider{flex:1;accent-color:var(--crimson);cursor:pointer}
.vol-mute{background:none;border:1px solid var(--box-border);color:var(--mist);cursor:pointer;padding:.3rem .6rem;font-size:.8rem;transition:all .2s}
.vol-mute:hover{border-color:var(--crimson);color:var(--silver)}

#help-overlay{position:fixed;inset:0;z-index:55;background:rgba(5,5,10,.9);display:none;flex-direction:column;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)}
.help-panel{background:rgba(15,10,20,.98);border:1px solid var(--box-border);padding:2rem;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.help-panel h2{font-family:'Cinzel',serif;color:var(--silver);font-size:1rem;letter-spacing:.25em;margin-bottom:1.5rem;border-bottom:1px solid var(--box-border);padding-bottom:.8rem}
.help-row{display:flex;gap:1rem;margin-bottom:1rem;font-size:.85rem;line-height:1.5}
.help-key{min-width:80px;color:var(--crimson);font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em}
.help-val{color:var(--mist)}

/* ── MINIGAME OVERLAY : iframe plein écran ── */
#minigame-overlay{
  position:fixed;inset:0;z-index:70;
  background:var(--obsidian);
  display:none;
}
#minigame-frame{
  width:100%;height:100%;
  border:none;display:block;
}

#ending-screen{background:var(--obsidian);flex-direction:column;gap:1.5rem;text-align:center;padding:2rem}
.ending-type{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.5em;color:var(--blood);text-transform:uppercase}
.ending-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,3rem);color:var(--silver);text-shadow:0 0 40px rgba(220,20,60,.4)}
.ending-text{font-family:'IM Fell English',serif;font-size:clamp(.9rem,2.2vw,1.1rem);color:var(--mist);max-width:500px;line-height:1.8;font-style:italic}
.btn-restart{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.3em;color:var(--silver);background:transparent;border:1px solid rgba(220,20,60,.5);padding:.9rem 2.5rem;cursor:pointer;transition:all .3s;margin-top:1rem}
.btn-restart:hover{border-color:var(--crimson);background:rgba(139,0,0,.2)}

#affinity-delta{position:fixed;top:60px;right:1rem;font-family:'Cinzel',serif;font-size:1rem;opacity:0;pointer-events:none;z-index:20;transition:opacity .3s;text-shadow:0 0 10px currentColor}
#affinity-delta.show{animation:deltaAnim 1.5s ease forwards}
@keyframes deltaAnim{0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:1;transform:translateY(-20px)}100%{opacity:0;transform:translateY(-30px)}}

#fade-overlay{position:fixed;inset:0;z-index:40;background:var(--obsidian);opacity:0;pointer-events:none;transition:opacity .5s}
#fade-overlay.fade-in{opacity:1;pointer-events:all}

.ripple{position:fixed;border-radius:50%;width:20px;height:20px;background:rgba(220,20,60,.3);pointer-events:none;z-index:9000;transform:translate(-50%,-50%) scale(0);animation:rippleAnim .6s ease forwards}
@keyframes rippleAnim{to{transform:translate(-50%,-50%) scale(8);opacity:0}}

@media(max-width:480px){.pause-panel{padding:1.5rem 1.2rem}#hud{padding:.6rem .8rem}#dialogue-wrap,#choices-wrap{padding:0 .5rem .5rem}#affinity-bar-outer{width:60px}}
/* GRANDS ÉCRANS (>= 1200px) : personnages plus petits */
@media (min-width: 1200px) {
  #char-wrap {
    max-height: 45% !important;
  }
  #char-img {
    max-width: 25vw !important;
  }
}
</style>
</head>
<body>

<div id="particles"></div>
<div id="fade-overlay"></div>
<div id="affinity-delta"></div>

<div id="loading-screen" class="screen active">
  <div class="loading-inner">
    <div class="loading-title" id="loading-label">Loading</div>
    <div class="loading-bar-outer"><div class="loading-bar-inner" id="loading-bar"></div></div>
    <div class="loading-pct" id="loading-pct">0%</div>
  </div>
</div>

<div id="title-screen" class="screen">
  <div class="title-bg-roses"></div>
  <div class="title-deco"></div>
  <div class="title-wrap">
    <div class="title-sub" id="title-sub">— a visual novel —</div>
    <div class="title-main">Love Me<br>To <span>Death</span></div>
    <div class="title-line"><span class="title-line-icon">&#10022;</span></div>
    <button class="btn-start" id="btn-start">BEGIN</button>
  </div>
</div>

<div id="lang-screen" class="screen">
  <div class="lang-title">Choose Your Language</div>
  <div class="lang-sub">Choisissez votre langue</div>
  <div class="lang-choices">
    <button class="lang-btn" data-lang="en"><span class="lang-flag">&#127468;&#127463;</span><span class="lang-name">ENGLISH</span></button>
    <button class="lang-btn" data-lang="fr"><span class="lang-flag">&#127467;&#127479;</span><span class="lang-name">FRAN&#199;AIS</span></button>
  </div>
</div>

<div id="policy-screen" class="screen">
  <div class="policy-container">
    <div class="policy-header" id="policy-header">Terms, Privacy &amp; Credits</div>
    <div class="policy-scroll" id="policy-scroll"></div>
    <div class="policy-progress"><div class="policy-progress-bar" id="policy-bar"></div></div>
    <div class="policy-footer">
      <span class="policy-hint" id="policy-hint">Scroll to the bottom to accept</span>
      <button class="btn-accept" id="btn-accept">ACCEPT &amp; PLAY</button>
    </div>
  </div>
</div>

<div id="game-screen" class="screen">
  <div id="game-bg"></div>
  <div id="char-wrap"><img id="char-img" src="" alt="" onerror="this.style.display='none'"></div>
  <div id="hud">
    <div class="hud-left">
      <div id="affinity-wrap">
        <span class="affinity-icon" id="aff-icon">&#9829;</span>
        <div id="affinity-bar-outer"><div id="affinity-bar"></div></div>
        <span id="affinity-val">0</span>
      </div>
    </div>
    <div class="hud-right">
      <button class="hud-btn" id="btn-history">&#128220;</button>
      <button class="hud-btn" id="btn-help">?</button>
      <button class="hud-btn" id="btn-pause">&#9208;</button>
    </div>
  </div>
  <div id="dialogue-wrap">
    <div id="dialogue-box">
      <div id="speaker-bar"><span class="speaker-deco">&#9670;</span><span id="speaker-name"></span></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-nav">
        <button id="btn-back-dialogue">&#9666; BACK</button>
        <span id="dialogue-continue">&#9662;</span>
      </div>
    </div>
  </div>
  <div id="choices-wrap"></div>
</div>

<div id="ending-screen" class="screen">
  <div class="ending-type" id="ending-type"></div>
  <div class="ending-title" id="ending-title"></div>
  <div class="ending-text" id="ending-text"></div>
  <button class="btn-restart" id="btn-restart-end">RESTART</button>
</div>

<div id="history-overlay">
  <div class="history-header">
    <span id="history-title-label">DIALOGUE HISTORY</span>
    <button class="hud-btn" id="btn-close-history">&#10005;</button>
  </div>
  <div id="history-list"></div>
</div>

<div id="pause-modal">
  <div class="pause-panel">
    <div class="pause-title">— PAUSE —</div>

const ENDING_RANGES=[{min:51,max:100,endingId:'true_love'},{min:1,max:50,endingId:'bittersweet'},{min:-50,max:0,endingId:'bad_end_1'},{min:-100,max:-51,endingId:'bad_end_2'}];
const LS_KEY='lmtd_save_v3';

const state={
  lang:'en', firstTime:true, sceneIndex:0, scenes:[], navStack:[],
  affinity:0, history:[], muted:false, volume:0.7, currentMusic:null,
  isTyping:false, typing:null, awaitingChoice:false,
  pendingChoices:null
};

function t(k){return(I18N[state.lang]||I18N.en)[k];}

// ── APPLIQUER LA LANGUE ──
function applyLang(){
  const L=I18N[state.lang]||I18N.en;
  document.getElementById('loading-label').textContent=L.loading;
  document.getElementById('title-sub').textContent=L.titleSub;
  document.getElementById('btn-start').textContent=checkHasSave()?L.btnContinue:L.btnBegin;
  document.getElementById('policy-header').textContent=L.policyHeader;
  document.getElementById('policy-hint').textContent=L.policyHint;
  document.getElementById('btn-accept').textContent=L.btnAccept;
  document.getElementById('policy-scroll').innerHTML=L.policyContent;
  document.getElementById('btn-back-dialogue').textContent=L.btnBack;
  document.getElementById('btn-resume').textContent=L.btnResume;
  document.getElementById('btn-save-quit').textContent=L.btnSaveQuit;
  document.getElementById('btn-restart-game').textContent=L.btnRestart;
  document.getElementById('btn-restart-end').textContent=L.btnRestartEnd;
  document.querySelector('.vol-label').textContent=L.musicLabel;
  document.getElementById('history-title-label').textContent=L.historyTitle;
  document.getElementById('help-title').textContent=L.helpTitle;
  document.getElementById('btn-close-help').textContent=L.helpClose;
  const hr=document.getElementById('help-rows');
  hr.innerHTML='';
  // ── FIX CRITIQUE : vérification que helpRows est bien un tableau de paires ──
  const rows = L.helpRows;
  if(Array.isArray(rows)){
    rows.forEach(function(row){
      if(Array.isArray(row) && row.length >= 2){
        hr.innerHTML += '<div class="help-row"><span class="help-key">'+row[0]+'</span><span class="help-val">'+row[1]+'</span></div>';
      }
    });
  }
}

// ── PRELOAD ──
function checkHasSave(){try{const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');return d.firstTime===false;}catch(e){return false;}}

async function preloadAssets(){
  const bar=document.getElementById('loading-bar'),label=document.getElementById('loading-pct');
  const imgs=GAME_CONFIG.preloadImages;
  if(!imgs.length){bar.style.width='100%';label.textContent='100%';return;}
  let loaded=0;
  const tick=()=>{loaded++;const p=Math.round(loaded/imgs.length*100);bar.style.width=p+'%';label.textContent=p+'%';};
  await Promise.allSettled(imgs.map(s=>new Promise(r=>{const i=new Image();i.onload=i.onerror=()=>{tick();r();};i.src=s;})));
}

function preloadImage(src){
  return new Promise(res=>{if(!src)return res();const i=new Image();i.onload=i.onerror=res;i.src=src;});
}

async function loadChapters(){
  let all=[];
  for(const file of GAME_CONFIG.chapterFiles){
    const path='json/'+state.lang+'/'+file;
    try{
      const r=await fetch(path);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();
      all=all.concat(d);
    }catch(e){console.warn('Cannot load',path,e.message);}
  }
  if(!all.length){
    const L=I18N[state.lang]||I18N.en;
    all=[{id:'s_demo',bg:null,charImg:null,speaker:L.systemLabel,text:L.systemFallback,typeSpeed:30,next:'__ending__'}];
  }
  state.scenes=all;
}

// ── SAVE / LOAD ──
function saveGame(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      lang:state.lang,firstTime:false,sceneIndex:state.sceneIndex,
      navStack:state.navStack.slice(-30),affinity:state.affinity,
      history:state.history.slice(-60),volume:state.volume,
      muted:state.muted,currentMusic:state.currentMusic
    }));
  }catch(e){}
}
function loadSave(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    state.lang=d.lang||'en';
    state.firstTime=d.firstTime!==false;
    state.sceneIndex=d.sceneIndex||0;
    state.navStack=(d.navStack||[]).map(e=>typeof e==='number'?{sceneIndex:e,affinityDelta:0}:e);
    state.affinity=d.affinity||0;
    state.history=d.history||[];
    state.volume=d.volume!==undefined?d.volume:0.7;
    state.muted=d.muted||false;
    state.currentMusic=d.currentMusic||null;
    return true;
  }catch(e){return false;}
}
function resetGame(){try{localStorage.removeItem(LS_KEY);}catch(e){}location.reload();}

// ── ÉCRANS ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function fadeTransition(cb){const fo=document.getElementById('fade-overlay');fo.classList.add('fade-in');setTimeout(()=>{cb();setTimeout(()=>fo.classList.remove('fade-in'),100);},500);}

// ── AFFINITÉ ──
function updateAffinity(d){if(!d)return;state.affinity=Math.max(-100,Math.min(100,state.affinity+d));renderAffinity();showAffinityDelta(d);}
function renderAffinity(){
  const aff=state.affinity;
  document.getElementById('affinity-bar').style.width=((aff+100)/200*100)+'%';
  const v=document.getElementById('affinity-val');
  v.textContent=aff>0?'+'+aff:String(aff);
  const tp=(aff+100)/200;
  const r=Math.round(107+(220-107)*tp),g=Math.round(33+(20-33)*tp),b=Math.round(168+(60-168)*tp);
  document.getElementById('affinity-bar').style.background='rgb('+r+','+g+','+b+')';
  v.style.color=aff>=0?'var(--rose)':'var(--affinity-neg)';
  document.getElementById('aff-icon').style.filter=aff>=0?'drop-shadow(0 0 4px var(--crimson))':'drop-shadow(0 0 4px #6B21A8)';
}
function showAffinityDelta(d){
  const el=document.getElementById('affinity-delta');
  el.className='';
  el.textContent=(d>0?'+ ':'\u2212 ')+Math.abs(d);
  el.style.color=d>0?'var(--crimson)':'#9333ea';
  void el.offsetWidth;
  el.className='show';
}

// ── AUDIO ──
const bgm=document.getElementById('bgm');
function startIntroMusic(){
  bgm.src=GAME_CONFIG.introMusic;bgm.loop=true;bgm.muted=false;
  bgm.volume=state.muted?0:state.volume;bgm.play().catch(()=>{});
  state.currentMusic=GAME_CONFIG.introMusic;
}
function playMusic(src){
  if(!src)return;
  if(state.currentMusic===src&&!bgm.paused)return;
  state.currentMusic=src;bgm.src=src;bgm.loop=true;bgm.muted=false;
  bgm.volume=state.muted?0:state.volume;bgm.play().catch(()=>{});
}
function stopMusic(){bgm.pause();bgm.src='';state.currentMusic=null;}
function applyVolume(){bgm.volume=state.muted?0:state.volume;}

// ── BACKGROUND ──
let lastBg=null;
async function setBg(src){
  if(!src||src===lastBg)return;
  await preloadImage(src);
  document.getElementById('game-bg').style.backgroundImage="url('"+src+"')";
  lastBg=src;
}
function setCharacter(img){
  const wrap=document.getElementById('char-wrap'),el=document.getElementById('char-img');
  if(!img){wrap.style.opacity='0';return;}
  el.src=img;el.style.display='';wrap.style.opacity='1';
}

// ── TYPEWRITER ──
const DEFAULT_TYPE_SPEED=22;
function typeText(el,text,speed,onDone){
  el.textContent='';state.isTyping=true;let i=0;
  if(state.typing)clearInterval(state.typing);
  const ms=(typeof speed==='number'&&speed>0)?speed:DEFAULT_TYPE_SPEED;
  state.typing=setInterval(()=>{
    el.textContent+=text[i++];
    if(i>=text.length){clearInterval(state.typing);state.typing=null;state.isTyping=false;if(onDone)onDone();}
  },ms);
}
function skipTyping(text){if(state.typing){clearInterval(state.typing);state.typing=null;}state.isTyping=false;document.getElementById('dialogue-text').textContent=text;}

// ── HISTORIQUE ──
function addToHistory(sp,tx,ic){state.history.push({speaker:sp,text:tx,isChoice:ic});}
function renderHistory(){
  const list=document.getElementById('history-list');list.innerHTML='';
  state.history.forEach(e=>{
    const d=document.createElement('div');d.className='history-entry';
    d.innerHTML=e.isChoice
      ?'<div class="h-choice">\u25B8 '+e.text+'</div>'
      :'<div class="h-name">'+e.speaker+'</div><div>'+e.text+'</div>';
    list.appendChild(d);
  });
  list.scrollTop=list.scrollHeight;
}

// ── BOUTON RETOUR ──
function updateBackBtn(){
  const b=document.getElementById('btn-back-dialogue');
  state.navStack.length>0&&!state.awaitingChoice?b.classList.add('visible'):b.classList.remove('visible');
}
document.getElementById('btn-back-dialogue').addEventListener('click',()=>{
  if(state.awaitingChoice||!state.navStack.length)return;
  if(state.typing){clearInterval(state.typing);state.typing=null;}state.isTyping=false;
  const entry=state.navStack.pop();
  if(entry.affinityDelta){state.affinity=Math.max(-100,Math.min(100,state.affinity-entry.affinityDelta));renderAffinity();showAffinityDelta(-entry.affinityDelta);}
  state.sceneIndex=entry.sceneIndex;renderScene(state.scenes[entry.sceneIndex],true);
});

// ── SCÈNES ──
function getSceneIndex(id){return state.scenes.findIndex(s=>s.id===id);}

function renderScene(scene,fromBack){
  if(!scene){triggerEnding();return;}

  // ══ FIX CRITIQUE : gestion des mini-jeux ══
  if(scene.type==='minigame'){
    triggerMinigame(scene,function(){
      if(scene.next&&scene.next!=='__ending__') navigateTo(scene.next);
      else triggerEnding();
    });
    return;
  }

  if(scene.bg)setBg(scene.bg);
  setCharacter(scene.charImg||null);
  if(scene.music)playMusic(scene.music);

  document.getElementById('speaker-name').textContent=scene.speaker||'';
  const cw=document.getElementById('choices-wrap');
  cw.style.display='none';cw.innerHTML='';
  document.getElementById('dialogue-wrap').style.display='';
  document.getElementById('dialogue-continue').style.display='';
  state.awaitingChoice=false;
  state.pendingChoices=scene.choices||null;

  addToHistory(scene.speaker||'',scene.text||'',false);
  typeText(document.getElementById('dialogue-text'),scene.text||'',scene.typeSpeed,null);
  updateBackBtn();
  saveGame();

  if(scene.next&&scene.next!=='__ending__'){
    const ni=getSceneIndex(scene.next);
    if(ni!==-1&&state.scenes[ni]&&state.scenes[ni].bg)preloadImage(state.scenes[ni].bg);
  }
}

function advance(){
  if(state.awaitingChoice)return;
  const scene=state.scenes[state.sceneIndex];
  if(!scene)return;
  if(state.isTyping){skipTyping(scene.text||'');return;}
  if(state.pendingChoices){renderChoices(state.pendingChoices);state.pendingChoices=null;return;}
  if(scene.next==='__ending__'){triggerEnding();return;}
  if(scene.next)navigateTo(scene.next);
}

function navigateTo(id,affinityDelta){
  affinityDelta=affinityDelta||0;
  if(!id||id==='__ending__'){triggerEnding();return;}
  const idx=getSceneIndex(id);
  if(idx===-1){triggerEnding();return;}
  state.navStack.push({sceneIndex:state.sceneIndex,affinityDelta:affinityDelta});
  state.sceneIndex=idx;renderScene(state.scenes[idx]);
}

function renderChoices(choices){
  state.awaitingChoice=true;updateBackBtn();
  const cw=document.getElementById('choices-wrap');
  document.getElementById('dialogue-continue').style.display='none';
  document.getElementById('dialogue-wrap').style.display='';
  cw.innerHTML='';cw.style.display='flex';
  choices.forEach(ch=>{
    const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=ch.text;
    btn.addEventListener('click',()=>{
      addToHistory(t('youLabel'),ch.text,true);
      const delta=ch.affinityDelta||0;if(delta)updateAffinity(delta);
      cw.style.display='none';state.awaitingChoice=false;
      document.getElementById('dialogue-continue').style.display='';
      if(ch.next==='__ending__'){triggerEnding();return;}
      navigateTo(ch.next,delta);
    });
    cw.appendChild(btn);
  });
}

// ── FIN ──
function triggerEnding(){
  const aff=state.affinity;let endingId='bad_end_2';
  for(const r of ENDING_RANGES){if(aff>=r.min&&aff<=r.max){endingId=r.endingId;break;}}
  const ending=(I18N[state.lang]||I18N.en).endings[endingId];
  document.getElementById('ending-type').textContent=ending.type;
  document.getElementById('ending-title').textContent=ending.title;
  document.getElementById('ending-text').textContent=ending.text;
  document.getElementById('ending-type').style.color=ending.isBad?'#ff6b6b':'var(--blood)';
  fadeTransition(()=>showScreen('ending-screen'));
  playMusic(ending.isBad?'music/bad_ending.mp3':'music/true_ending.mp3');
}

// ══════════════════════════════════════════════════════════
// MINIGAME — système iframe
// Le minigame est chargé dans une iframe plein écran.
// Pour terminer, le minigame appelle :
//   window.parent.LMTD_MINIGAME_DONE({ affinity: N })
// depuis son propre JS.
// ══════════════════════════════════════════════════════════
function triggerMinigame(scene,onComplete){
  const file = scene.minigameFile || ('minigames/'+(scene.name||scene.minigame)+'.html');
  const ov  = document.getElementById('minigame-overlay');
  const frm = document.getElementById('minigame-frame');

  // Passer le config glutamate à l'iframe via l'URL ou via postMessage après chargement
  // On utilise sessionStorage comme pont cross-frame (même origine)
  try{
    // Détecter si le joueur a choisi le glutamate (scène précédente)
    const glutamate = state.history.some(h => h.text && h.text.toLowerCase().includes('glutamate') && h.isChoice===false && h.speaker==='Dazai');
    sessionStorage.setItem('LMTD_CFG', JSON.stringify({ glutamate: glutamate, affinity: state.affinity }));
  }catch(e){}

  // Callback appelé par l'iframe
  window.LMTD_MINIGAME_DONE = function(result){
    ov.style.display='none';
    frm.src='';
    window.LMTD_MINIGAME_DONE=null;
    // Appliquer le delta d'affinité éventuel du mini-jeu
    if(result && result.affinity){
      updateAffinity(result.affinity);
    }
    onComplete();
  };

  frm.src=file;
  ov.style.display='block';
}

// ── DÉMARRAGE ──
function startGame(fromIdx){
  fromIdx=fromIdx||0;
  stopMusic();
  state.sceneIndex=fromIdx;
  lastBg=null;
  showScreen('game-screen');
  renderAffinity();
  renderScene(state.scenes[fromIdx]);
}

async function boot(){
  state.lang='en';
  applyLang();
  await preloadAssets();
  fadeTransition(()=>showScreen('title-screen'));
}

// ── ÉVÉNEMENTS ──
document.getElementById('btn-start').addEventListener('click',()=>{
  startIntroMusic();
  const saved=loadSave();
  if(saved&&!state.firstTime){
    applyLang();
    loadChapters().then(()=>{
      fadeTransition(()=>{
        stopMusic();
        showScreen('game-screen');
        renderAffinity();
        lastBg=null;
        const scene=state.scenes[state.sceneIndex]||state.scenes[0];
        renderScene(scene);
      });
    });
  }else{
    fadeTransition(()=>showScreen('lang-screen'));
  }
});

document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.lang=btn.dataset.lang;
    applyLang();
    document.getElementById('policy-bar').style.width='0%';
    document.getElementById('btn-accept').classList.remove('ready');
    fadeTransition(()=>showScreen('policy-screen'));
  });
});

const policyScroll=document.getElementById('policy-scroll');
policyScroll.addEventListener('scroll',()=>{
  const{scrollTop,scrollHeight,clientHeight}=policyScroll;
  const pct=scrollTop/(scrollHeight-clientHeight);
  document.getElementById('policy-bar').style.width=Math.min(100,pct*100)+'%';
  if(pct>=0.98)document.getElementById('btn-accept').classList.add('ready');
});

document.getElementById('btn-accept').addEventListener('click',async()=>{
  if(!document.getElementById('btn-accept').classList.contains('ready'))return;
  state.firstTime=false;
  await loadChapters();
  saveGame();
  fadeTransition(()=>startGame(0));
});

document.getElementById('dialogue-box').addEventListener('click',e=>{if(e.target.id==='btn-back-dialogue')return;advance();});
document.getElementById('game-bg').addEventListener('click',advance);
document.getElementById('char-wrap').addEventListener('click',advance);

document.getElementById('btn-history').addEventListener('click',()=>{renderHistory();document.getElementById('history-overlay').style.display='flex';});
document.getElementById('btn-close-history').addEventListener('click',()=>{document.getElementById('history-overlay').style.display='none';});
document.getElementById('btn-help').addEventListener('click',()=>{document.getElementById('help-overlay').style.display='flex';});
document.getElementById('btn-close-help').addEventListener('click',()=>{document.getElementById('help-overlay').style.display='none';});
document.getElementById('btn-pause').addEventListener('click',()=>{saveGame();document.getElementById('pause-modal').style.display='flex';});
document.getElementById('btn-resume').addEventListener('click',()=>{document.getElementById('pause-modal').style.display='none';});

document.getElementById('btn-save-quit').addEventListener('click',()=>{
  saveGame();
  fadeTransition(()=>{
    document.getElementById('pause-modal').style.display='none';
    showScreen('title-screen');
    document.getElementById('btn-start').textContent=t('btnContinue');
    startIntroMusic();
  });
});

document.getElementById('btn-restart-game').addEventListener('click',()=>{if(confirm(t('confirmRestart')))resetGame();});
document.getElementById('btn-restart-end').addEventListener('click',()=>{if(confirm(t('confirmRestartEnd')))resetGame();});

const volSlider=document.getElementById('vol-slider'),btnMute=document.getElementById('btn-mute');
volSlider.value=state.volume;
volSlider.addEventListener('input',()=>{state.volume=parseFloat(volSlider.value);applyVolume();saveGame();});
btnMute.addEventListener('click',()=>{state.muted=!state.muted;btnMute.textContent=state.muted?'\u{1F507}':'\u{1F50A}';applyVolume();saveGame();});

(function(){
  const c=document.getElementById('particles'),colors=['#DC143C','#8B0000','#FF6B8A','#C9A84C'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.cssText='left:'+Math.random()*100+'%;animation-duration:'+(6+Math.random()*10)+'s;animation-delay:'+Math.random()*8+'s;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px;background:'+colors[i%colors.length]+';';
    c.appendChild(p);
  }
})();

document.addEventListener('click',e=>{
  const r=document.createElement('div');r.className='ripple';
  r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),600);
});

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();advance();}
  if(e.key==='Backspace'&&!state.awaitingChoice)document.getElementById('btn-back-dialogue').click();
  if(e.key==='Escape'){
    const h=document.getElementById('history-overlay').style.display==='flex';
    const hp=document.getElementById('help-overlay').style.display==='flex';
    const p=document.getElementById('pause-modal').style.display==='flex';
    if(h)document.getElementById('history-overlay').style.display='none';
    else if(hp)document.getElementById('help-overlay').style.display='none';
    else if(p)document.getElementById('pause-modal').style.display='none';
    else if(document.getElementById('game-screen').classList.contains('active'))document.getElementById('pause-modal').style.display='flex';
  }
});

boot();
</script>
</body>
</html>
